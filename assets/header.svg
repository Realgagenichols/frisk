<svg xmlns="http://www.w3.org/2000/svg" width="860" height="250" viewBox="0 0 860 250" role="img" aria-label="frisk — vet a third-party MCP server before you trust it">
  <!-- inspection-notice palette, mirrored from site/style.css -->
  <rect width="860" height="250" fill="#f4f1ea"/>
  <rect x="0.5" y="0.5" width="859" height="249" fill="none" stroke="#16202e" stroke-opacity="0.35"/>

  <!-- slip small print -->
  <text x="48" y="40" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" letter-spacing="4" fill="#4d5865">MCP SERVER SCREENING &#183; NOTICE OF INSPECTION</text>
  <text x="812" y="40" text-anchor="end" font-family="'Courier New', Courier, monospace" font-size="12" letter-spacing="2" fill="#5d6673">NO. D1&#8211;D8</text>

  <!-- navy signage band -->
  <rect x="0" y="56" width="860" height="86" fill="#1b2a44"/>
  <text x="48" y="118" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="58" font-weight="bold" fill="#fdfcf8">frisk</text>
  <!-- signage chevrons -->
  <g fill="#fdfcf8" fill-opacity="0.9">
    <polygon points="742,79 762,99 742,119 750,119 770,99 750,79"/>
    <polygon points="766,79 786,99 766,119 774,119 794,99 774,79"/>
    <polygon points="790,79 810,99 790,119 798,119 818,99 798,79"/>
  </g>

  <!-- tagline -->
  <text x="48" y="180" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#16202e">Vet a third-party MCP server before you trust it.</text>
  <text x="48" y="207" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" fill="#4d5865">sandboxed enumeration &#183; 8 deterministic detectors &#183; honeypot &#183; rug-pull lockfile</text>

  <!-- red stamp -->
  <g transform="rotate(-7 710 184)" opacity="0.88">
    <rect x="615" y="152" width="190" height="64" fill="none" stroke="#a31f26" stroke-width="3"/>
    <rect x="621" y="158" width="178" height="52" fill="none" stroke="#a31f26" stroke-width="1.5"/>
    <text x="710" y="180" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" letter-spacing="3" fill="#a31f26">VET BEFORE</text>
    <text x="710" y="201" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" letter-spacing="3" fill="#a31f26">YOU TRUST</text>
  </g>

  <!-- perforation -->
  <line x1="24" y1="232" x2="836" y2="232" stroke="#16202e" stroke-opacity="0.16" stroke-width="1.5" stroke-dasharray="7 6"/>
</svg>
